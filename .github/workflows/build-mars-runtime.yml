name: build-mars-runtime

# Builds the mars-runtime container image and pushes it to GHCR.
#
# Triggers:
#   * PRs touching the runtime image surface (Dockerfile, src/, or this workflow).
#   * Pushes to main on the same paths → build + push tagged with SHA + latest.
#   * Manual workflow_dispatch for ad-hoc rebuilds.

on:
  pull_request:
    paths:
      - Dockerfile
      - src/**
      - pyproject.toml
      - .github/workflows/build-mars-runtime.yml
  push:
    branches: [main]
    paths:
      - Dockerfile
      - src/**
      - pyproject.toml
      - .github/workflows/build-mars-runtime.yml
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build + push mars-runtime
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mars-runtime
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=mars-runtime
            org.opencontainers.image.description=Minimal agent runtime — one script, Anthropic backend.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
