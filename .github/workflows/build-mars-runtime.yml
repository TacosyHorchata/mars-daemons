name: build-mars-runtime

# Builds the mars-runtime container image and pushes it to GHCR.
#
# This workflow is the "CI build path" that satisfies Epic 3 Story 3.1's
# definition of done — Pedro's local Docker Desktop is blocked by a hub
# proxy misconfiguration, so the authoritative build runs here instead.
#
# Triggers:
#  * Pull requests that touch the runtime image surface (Dockerfile,
#    start.sh, runtime source, shared schema, or the CI workflow itself)
#    — no push, just build, so broken images fail the PR.
#  * Pushes to main on the same path filter — builds AND pushes tagged
#    with the commit SHA + ``:main`` + ``:latest``.
#
# Tags pushed to ghcr.io/<owner>/mars-runtime:
#  * <short-sha>     — immutable reference used by ``mars deploy``
#  * main            — rolling tag for the latest main build
#  * latest          — convenience alias of ``main``

on:
  pull_request:
    paths:
      - apps/mars-runtime/**
      - apps/mars-control/backend/src/mars_control/**
      - apps/mars-control/backend/src/schema/**
      - .github/workflows/build-mars-runtime.yml
  push:
    branches: [main]
    paths:
      - apps/mars-runtime/**
      - apps/mars-control/backend/src/mars_control/**
      - apps/mars-control/backend/src/schema/**
      - .github/workflows/build-mars-runtime.yml
  # Manual trigger for ad-hoc rebuilds (Pedro debugging in the UI).
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build + push mars-runtime
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Only log in when we're going to push — PR builds just verify.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mars-runtime
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=mars-runtime
            org.opencontainers.image.description=Mars daemon host — one per workspace, runs Claude Code sessions.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/mars-runtime/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image boots
        # Smoke test: start the container, hit /health, stop. Proves the
        # supervisor comes up, uvicorn binds, and tini forwards SIGTERM.
        # Does NOT exercise ``claude -p`` because that needs a real
        # CLAUDE_CODE_OAUTH_TOKEN (deferred to the Fly deploy workflow).
        run: |
          set -euo pipefail
          IMAGE_REF="$(echo '${{ steps.meta.outputs.tags }}' | head -n1)"
          echo "Smoke-testing $IMAGE_REF"
          docker run --rm -d \
            --name mars-smoke \
            -p 8080:8080 \
            -e MARS_EVENT_SECRET=ci-smoke \
            "$IMAGE_REF"
          # Wait up to 20s for /health to respond
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/health > /tmp/health.json; then
              echo "health response: $(cat /tmp/health.json)"
              break
            fi
            sleep 1
          done
          docker logs mars-smoke | tail -30 || true
          curl -sf http://localhost:8080/health | grep -q '"status":"ok"'
          docker stop mars-smoke
