name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    name: Python (uv + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Run pytest
        # Exit code 5 = "no tests collected", which is expected on the empty scaffold.
        run: |
          set +e
          uv run pytest
          code=$?
          if [ $code -eq 0 ] || [ $code -eq 5 ]; then
            exit 0
          fi
          exit $code

  node:
    name: Node (pnpm + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: pnpm install --ignore-scripts

      - name: Typecheck
        run: pnpm run typecheck
