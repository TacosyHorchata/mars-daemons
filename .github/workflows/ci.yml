name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    name: Python (uv + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - run: uv python install 3.11

      - run: uv sync --group dev

      - run: uv run pytest
