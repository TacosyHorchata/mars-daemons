# Tracker Ops Assistant — Mars v1 turnkey template (Story 8.1).
#
# This template is the operator-facing surface of Mars: Maat (Orion's
# CEO) never sees this file — the onboarding wizard in the control
# plane renders its Spanish labels, asks for the secret values, and
# substitutes them into a deploy-time copy of this config before
# handing it to `mars deploy`.
#
# Validation: `AgentConfig.parse_file(...)` must succeed on this
# file as-is (no substitutions). The placeholder secrets in `env:`
# are names, not values — the runtime reads them from Fly secrets
# at spawn time, which is safe even when unset (the supervisor
# warns but doesn't crash). Story 8.4's deploy endpoint is
# responsible for injecting the actual secret values.
name: tracker-ops-assistant
description: |
  Asistente de operaciones para equipos de trackers en español — lee WhatsApp, consulta el CRM y resuelve pendientes del día sin que tengas que escribir nada.
runtime: claude-code
system_prompt_path: /workspace/tracker-ops-assistant.prompt.md
workdir: /workspace/tracker-ops-assistant
mcps:
  - whatsapp
  - zoho
  - pilot
tools:
  - Read
  - Write
  - Edit
  - Bash
  - Grep
  - Glob
env:
  - ANTHROPIC_API_KEY
  - CLAUDE_CODE_OAUTH_TOKEN
  - WHATSAPP_SESSION_NAME
  - ZOHO_CLIENT_ID
  - ZOHO_CLIENT_SECRET
  - ZOHO_REFRESH_TOKEN
  - PILOT_SESSION_NAME
