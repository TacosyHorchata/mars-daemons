# Reference daemon for Orion (Mars design partner #1).
# This is the dev-track example used to validate the schema — it is NOT the
# Maat turnkey template. That template ships in Epic 8 as
# apps/mars-control/templates/tracker-ops-assistant.yaml.
name: orion-ops
description: Ops assistant for Orion's tracker fleet — answers questions about vehicle status and surfaces alerts from Zoho.
runtime: claude-code
system_prompt_path: ./CLAUDE.md
workdir: /workspace/orion
mcps:
  - whatsapp
  - zoho
tools:
  - Read
  - Bash
env:
  - ZOHO_API_KEY
  - ANTHROPIC_API_KEY
