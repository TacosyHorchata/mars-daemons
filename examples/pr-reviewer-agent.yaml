# Pedro's dogfood daemon.
# Reviews PRs on Camtom's epic/agents-v2 branch and posts structured review
# comments. This is the Day 10 smoke-test target in the v1 plan.
name: pr-reviewer
description: Reviews open pull requests on Camtom's epic/agents-v2 branch and posts structured review comments.
runtime: claude-code
system_prompt_path: ./CLAUDE.md
workdir: /workspace/pr-reviewer
mcps:
  - github
tools:
  - Bash
  - Read
  - Grep
  - Glob
env:
  - GITHUB_TOKEN
  - ANTHROPIC_API_KEY
