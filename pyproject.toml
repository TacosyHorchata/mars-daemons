[project]
name = "mars-daemons"
version = "0.1.0"
description = "Mars — a cloud platform for hosting AI daemons powered by Claude Code and Codex CLIs."
requires-python = ">=3.11"
readme = "README.md"
dependencies = []

[dependency-groups]
dev = [
    "pytest>=8.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"
